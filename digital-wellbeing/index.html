<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>The Wanderer's Digital Escape</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-narrative: 'Crimson Pro', Georgia, serif;
      --font-ui: 'Space Mono', monospace;
      --c-focus: #22d3ee;
      --c-dopamine: #fb923c;
      --c-oneness: #a78bfa;
      --c-tranquility: #4ade80;
      --transition: 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; overflow: hidden; background: #000; }

    #root { height: 100%; }

    /* ── APP SHELL ──────────────────────────────────────────────────────────── */
    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: opacity var(--transition);
    }
    .app--fade { opacity: 0; }

    /* ── BACKGROUNDS ────────────────────────────────────────────────────────── */
    .scene-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      transition: background 1.2s ease;
    }

    /* Swamp particles */
    .scene-bg--swamp::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(34,197,94,0.18) 1px, transparent 1px),
        radial-gradient(circle, rgba(34,197,94,0.10) 1px, transparent 1px);
      background-size: 60px 60px, 35px 35px;
      background-position: 0 0, 17px 30px;
      animation: particles-drift 12s linear infinite;
    }
    .scene-bg--swamp::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(180deg, transparent, rgba(6,18,8,0.7));
    }

    /* Arcade scanlines */
    .scene-bg--arcade::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.25) 3px, rgba(0,0,0,0.25) 4px);
    }
    .scene-bg--arcade::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(168,85,247,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(249,115,22,0.1) 0%, transparent 40%),
                  radial-gradient(ellipse at 80% 60%, rgba(34,211,238,0.08) 0%, transparent 40%);
      animation: arcade-pulse 4s ease-in-out infinite alternate;
    }

    /* City stars */
    .scene-bg--city::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,220,100,0.6) 1px, transparent 1px),
        radial-gradient(circle, rgba(200,200,255,0.4) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,200,200,0.3) 1px, transparent 1px);
      background-size: 120px 80px, 80px 120px, 200px 150px;
      background-position: 10px 10px, 40px 20px, 70px 5px;
    }
    .scene-bg--city::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(180deg, transparent, rgba(5,5,16,0.85));
    }

    /* Trail ambient */
    .scene-bg--trail::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: radial-gradient(ellipse at 70% 20%, rgba(251,191,36,0.12) 0%, transparent 50%);
      animation: dawn-glow 6s ease-in-out infinite alternate;
    }

    /* Beach waves */
    .scene-bg--beach::after {
      content: '';
      position: absolute;
      bottom: 15%;
      left: -10%;
      right: -10%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: wave 3s ease-in-out infinite;
      box-shadow: 0 20px 0 rgba(255,255,255,0.2), 0 40px 0 rgba(255,255,255,0.15);
    }

    /* Ghost mode overlay */
    .scene-bg.ghost-mode::before {
      mix-blend-mode: screen;
    }
    .app.ghost-active .main-content {
      opacity: 0.82;
      filter: blur(0.4px);
    }
    .app.ghost-active .main-content::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(167,139,250,0.04) 8px, rgba(167,139,250,0.04) 9px);
      pointer-events: none;
    }

    /* Intro glow */
    .scene-bg--intro::before {
      content: '';
      position: absolute;
      top: 55%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 200px;
      background: radial-gradient(ellipse, rgba(100,60,200,0.5) 0%, transparent 70%);
      animation: phone-glow 2.5s ease-in-out infinite alternate;
      border-radius: 16px;
    }

    @keyframes particles-drift { from { background-position: 0 0, 17px 30px; } to { background-position: 0 -120px, 17px -90px; } }
    @keyframes arcade-pulse { from { opacity: 0.6; } to { opacity: 1; } }
    @keyframes dawn-glow { from { opacity: 0.5; } to { opacity: 1; } }
    @keyframes wave { 0%,100% { transform: scaleX(0.9) translateY(0); } 50% { transform: scaleX(1.05) translateY(-3px); } }
    @keyframes phone-glow { from { opacity: 0.5; transform: translate(-50%,-50%) scale(0.95); } to { opacity: 1; transform: translate(-50%,-50%) scale(1.05); } }
    @keyframes float-up { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes boss-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
    @keyframes world-intro-in { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes delete-dissolve { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-30px) scale(0.9); } }
    @keyframes meter-fill { from { width: 0; } }
    @keyframes frog-zoom { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── ILLUSTRATION KEYFRAMES ──────────────────────────────────────────── */
    @keyframes il-aura-pulse   { 0%,100%{opacity:0.6;transform:scale(0.95)} 50%{opacity:1;transform:scale(1.05)} }
    @keyframes il-screen-flick { 0%,100%{opacity:0.18} 40%{opacity:0.28} 70%{opacity:0.14} 85%{opacity:0.32} }
    @keyframes il-badge-pop    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    @keyframes il-fog-drift    { 0%{transform:translateX(-12px)} 100%{transform:translateX(12px)} }
    @keyframes il-fog2-drift   { 0%{transform:translateX(10px)} 100%{transform:translateX(-10px)} }
    @keyframes il-eye-halo     { 0%,100%{opacity:0.55;transform:scale(0.9)} 50%{opacity:1;transform:scale(1.1)} }
    @keyframes il-iris-pulse   { 0%,100%{opacity:0.22;transform:scale(1)} 50%{opacity:0.45;transform:scale(1.15)} }
    @keyframes il-pupil-blink  { 0%,88%,100%{transform:scaleY(1)} 94%{transform:scaleY(0.08)} }
    @keyframes il-pt-float     { 0%,100%{transform:translateY(0);opacity:0.5} 50%{transform:translateY(-14px);opacity:1} }
    @keyframes il-pt1-float    { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-10px);opacity:0.9} }
    @keyframes il-pt2-float    { 0%,100%{transform:translateY(0);opacity:0.6} 50%{transform:translateY(-18px);opacity:1} }
    @keyframes il-scr-flick    { 0%,100%{opacity:0.10} 25%{opacity:0.28} 60%{opacity:0.12} 80%{opacity:0.32} }
    @keyframes il-reel-spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes il-streak-pop   { 0%{opacity:0.7;transform:scale(1)} 100%{opacity:1;transform:scale(1.06)} }
    @keyframes il-coin-bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    @keyframes il-coin2-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes il-blob-pulse   { 0%,100%{opacity:0.3;transform:scaleX(1)} 50%{opacity:0.55;transform:scaleX(1.2)} }
    @keyframes il-light-blink  { 0%,100%{opacity:0.8} 45%,55%{opacity:0.2} }
    @keyframes il-star-tw      { 0%,100%{opacity:0.25} 50%{opacity:0.95} }
    @keyframes il-mirror-glow  { 0%,100%{filter:drop-shadow(0 0 3px rgba(167,139,250,0.3))} 50%{filter:drop-shadow(0 0 8px rgba(167,139,250,0.7))} }
    @keyframes il-win-blink    { 0%,100%{opacity:1} 45%,55%{opacity:0.15} }
    @keyframes il-sun-pulse    { 0%,100%{opacity:0.7;transform:scale(0.96)} 50%{opacity:1;transform:scale(1.04)} }
    @keyframes il-ray-spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes il-path-glow    { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    @keyframes il-runner-bob   { 0%{transform:translateY(0) rotate(-2deg)} 100%{transform:translateY(-4px) rotate(2deg)} }
    @keyframes il-leg1         { 0%{transform:rotate(-20deg)} 100%{transform:rotate(20deg)} }
    @keyframes il-leg2         { 0%{transform:rotate(20deg)} 100%{transform:rotate(-20deg)} }
    @keyframes il-wave-move    { 0%{transform:translateX(0)} 50%{transform:translateX(-18px)} 100%{transform:translateX(0)} }
    @keyframes il-w2-move      { 0%{transform:translateX(0)} 50%{transform:translateX(14px)} 100%{transform:translateX(0)} }
    @keyframes il-w3-move      { 0%{transform:translateX(0)} 50%{transform:translateX(-10px)} 100%{transform:translateX(0)} }
    @keyframes il-horiz-shim   { 0%,100%{opacity:0.3} 50%{opacity:0.65} }

    /* ── ILLUSTRATION LAYOUT ─────────────────────────────────────────────── */
    .main-content {
      position: relative;
      z-index: 5;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .illustration-area {
      flex: 0 0 34%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px 0 0;
      position: relative;
    }
    .scene-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 16px 16px;
      overflow: hidden;
    }
    .il {
      width: 100%;
      height: 100%;
      max-height: 190px;
      display: block;
      transform-box: fill-box;
    }

    /* Illustration element animations */
    .il-aura        { animation: il-aura-pulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-screen      { animation: il-screen-flick 3.5s ease-in-out infinite; }
    .il-badge       { animation: il-badge-pop 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-fog         { animation: il-fog-drift 9s ease-in-out infinite alternate; }
    .il-fog2        { animation: il-fog2-drift 11s ease-in-out infinite alternate; }
    .il-eye-halo    { animation: il-eye-halo 2.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-iris        { animation: il-iris-pulse 2.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-pupil       { animation: il-pupil-blink 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-pt--0       { animation: il-pt-float  3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-pt--1       { animation: il-pt1-float 4.6s ease-in-out infinite 0.8s; transform-box: fill-box; transform-origin: center; }
    .il-pt--2       { animation: il-pt2-float 3.2s ease-in-out infinite 1.6s; transform-box: fill-box; transform-origin: center; }
    .il-scr1        { animation: il-scr-flick 2.1s ease-in-out infinite; }
    .il-scr2        { animation: il-scr-flick 1.8s ease-in-out infinite 0.6s; }
    .il-reel1       { animation: il-reel-spin 4s linear infinite; transform-box: fill-box; transform-origin: center; }
    .il-reel2       { animation: il-reel-spin 3s linear infinite reverse; transform-box: fill-box; transform-origin: center; }
    .il-streak      { animation: il-streak-pop 1.1s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
    .il-coin1       { animation: il-coin-bounce 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-coin2       { animation: il-coin2-bounce 1.7s ease-in-out infinite 0.5s; transform-box: fill-box; transform-origin: center; }
    .il-blob        { animation: il-blob-pulse 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-light--0    { animation: il-light-blink 5s ease-in-out infinite; }
    .il-light--1    { animation: il-light-blink 7s ease-in-out infinite 1.5s; }
    .il-light--2    { animation: il-light-blink 4s ease-in-out infinite 0.8s; }
    .il-light--3    { animation: il-light-blink 6s ease-in-out infinite 2.2s; }
    .il-star--0     { animation: il-star-tw 3.2s ease-in-out infinite; }
    .il-star--1     { animation: il-star-tw 4.5s ease-in-out infinite 1.2s; }
    .il-star--2     { animation: il-star-tw 2.8s ease-in-out infinite 0.6s; }
    .il-mirror      { animation: il-mirror-glow 3s ease-in-out infinite; }
    .il-win--0      { animation: il-win-blink 6s ease-in-out infinite; }
    .il-win--1      { animation: il-win-blink 8.5s ease-in-out infinite 2s; }
    .il-win--2      { animation: il-win-blink 5s ease-in-out infinite 1s; }
    .il-win--3      { animation: il-win-blink 7s ease-in-out infinite 3s; }
    .il-sun         { animation: il-sun-pulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-ray         { animation: il-ray-spin 22s linear infinite; }
    .il-path        { animation: il-path-glow 2.4s ease-in-out infinite; }
    .il-runner      { animation: il-runner-bob 0.42s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
    .il-leg1        { animation: il-leg1 0.42s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top; }
    .il-leg2        { animation: il-leg2 0.42s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top; }
    .il-bsun        { animation: il-sun-pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .il-bray        { animation: il-ray-spin 28s linear infinite; }
    .il-horiz       { animation: il-horiz-shim 3.5s ease-in-out infinite; }
    .il-bwv1        { animation: il-wave-move 4.2s ease-in-out infinite; }
    .il-bwv2        { animation: il-w2-move   5.1s ease-in-out infinite 0.5s; }
    .il-bwv3        { animation: il-w3-move   6s   ease-in-out infinite 1s; }

    @media (min-width: 600px) {
      .scene-area { padding: 0 10% 20px; }
      .il { max-height: 210px; }
    }
    @media (min-width: 900px) {
      .scene-area { padding: 0 20% 24px; }
      .illustration-area { flex: 0 0 38%; }
      .il { max-height: 240px; }
    }

    /* ── HUD ────────────────────────────────────────────────────────────────── */
    .hud {
      position: relative;
      z-index: 10;
      padding: 10px 16px 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .hud-world-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .ghost-warning {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--c-oneness);
      animation: arcade-pulse 1.5s ease-in-out infinite alternate;
    }
    .hud-meters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }
    .meter {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .meter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meter-label {
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }
    .meter-value {
      font-family: var(--font-ui);
      font-size: 8px;
      font-weight: 700;
    }
    .meter-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }



    /* ── WORLD INTRO ────────────────────────────────────────────────────────── */
    .world-intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .world-intro--visible { opacity: 1; animation: world-intro-in 0.6s ease forwards; }
    .world-intro-number {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }
    .world-intro-title {
      font-family: var(--font-narrative);
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      text-wrap: balance;
    }
    .world-intro-desc {
      font-family: var(--font-narrative);
      font-size: clamp(15px, 3.5vw, 18px);
      font-style: italic;
      color: rgba(255,255,255,0.55);
      margin-bottom: 36px;
    }
    .world-intro-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 28px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .world-intro-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── SCENE CONTENT ──────────────────────────────────────────────────────── */
    .scene-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 100%;
      opacity: 0;
    }
    .scene-content--visible { opacity: 1; animation: fade-in 0.5s ease forwards; }

    /* ── BOSS TAG ───────────────────────────────────────────────────────────── */
    .boss-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      padding: 5px 12px;
      border-radius: 2px;
      align-self: flex-start;
      animation: boss-pulse 2s ease-in-out infinite;
    }

    /* ── NARRATIVE BOX ──────────────────────────────────────────────────────── */
    .narrative-box {
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 20px 22px;
      max-height: 38vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .narrative-box::-webkit-scrollbar { width: 3px; }
    .narrative-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .narrative-para {
      font-family: var(--font-narrative);
      font-size: clamp(15px, 3.5vw, 18px);
      line-height: 1.7;
      color: rgba(255,255,255,0.88);
      margin-bottom: 12px;
      text-wrap: pretty;
    }
    .narrative-para:last-child { margin-bottom: 0; }

    /* ── DATA REVEAL ────────────────────────────────────────────────────────── */
    .data-reveal {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 4px;
      padding: 16px 20px;
      margin-top: 10px;
    }
    .data-reveal-title {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(34,211,238,0.7);
      margin-bottom: 12px;
    }
    .data-stat { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .data-stat-label { font-family: var(--font-ui); font-size: 10px; color: rgba(255,255,255,0.5); width: 52%; flex-shrink: 0; }
    .data-stat-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .data-stat-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--c-focus), rgba(34,211,238,0.4));
      animation: meter-fill 1s ease forwards;
    }
    .data-stat-val { font-family: var(--font-ui); font-size: 10px; color: var(--c-focus); width: 28px; text-align: right; }
    .data-reveal-question {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      margin-top: 12px;
      text-align: center;
    }

    /* ── DUNBAR ─────────────────────────────────────────────────────────────── */
    .dunbar-quote {
      font-family: var(--font-narrative);
      font-size: clamp(16px, 4vw, 22px);
      font-style: italic;
      color: var(--c-oneness);
      text-align: center;
      padding: 12px 0;
      opacity: 0.9;
    }

    /* ── CHOICES ────────────────────────────────────────────────────────────── */
    .choices { display: flex; flex-direction: column; gap: 8px; }
    .choice-btn {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-narrative);
      font-size: clamp(14px, 3.5vw, 17px);
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 44px;
    }
    .choice-btn:hover, .choice-btn:focus-visible {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
      transform: translateX(3px);
    }
    .choice-btn:active { transform: translateX(1px) scale(0.99); }
    .choice-btn--primary {
      background: rgba(34,211,238,0.1);
      border-color: rgba(34,211,238,0.35);
      color: var(--c-focus);
    }
    .choice-btn--primary:hover { background: rgba(34,211,238,0.18); }
    .choice-btn--danger {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.35);
      color: #ef4444;
    }
    .choice-btn--danger:hover { background: rgba(239,68,68,0.18); }

    /* ── SPECIAL PANELS ─────────────────────────────────────────────────────── */
    .special-panel {
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    /* Timer */
    .timer-room { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .timer-candle { font-size: 32px; animation: arcade-pulse 2s ease-in-out infinite alternate; }
    .timer-svg-wrap {
      position: relative;
      width: 110px; height: 110px;
    }
    .timer-svg-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
    .timer-ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
    .timer-ring-fill { fill: none; stroke: var(--c-tranquility); stroke-width: 5; stroke-linecap: round; transition: stroke-dasharray 1s linear; }
    .timer-seconds {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: 28px;
      font-weight: 700;
      color: var(--c-tranquility);
    }
    .timer-instruction {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      max-width: 220px;
    }
    .timer-actions { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .timer-complete-text { font-family: var(--font-narrative); font-size: 28px; color: var(--c-tranquility); }
    .timer-complete-sub { font-family: var(--font-narrative); font-style: italic; font-size: 15px; color: rgba(255,255,255,0.55); }

    /* Delete Instagram */
    .delete-panel { background: rgba(10,0,20,0.85); border-color: rgba(239,68,68,0.2); }
    .delete-icon { font-size: 36px; }
    .delete-title {
      font-family: var(--font-ui);
      font-size: 18px;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .delete-stats {
      display: flex;
      gap: 16px;
      font-family: var(--font-ui);
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }
    .delete-warning {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #ef4444;
      text-transform: uppercase;
      animation: boss-pulse 1.5s ease-in-out infinite;
    }
    .delete-panel .choices { width: 100%; }
    .delete-dissolve {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: var(--font-narrative);
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      animation: delete-dissolve 2s ease forwards;
    }

    /* Frog */
    .frog-panel { gap: 20px; }
    .frog-well {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .frog-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      background: radial-gradient(ellipse at 50% 20%, rgba(135,206,235,0.3) 0%, rgba(0,20,10,0.9) 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }
    .frog-emoji { font-size: 28px; margin-top: 20px; }
    .frog-sky { font-size: 16px; margin-top: -8px; }
    .frog-caption {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
    }
    .frog-landscape {
      animation: frog-zoom 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .frog-horizon { font-size: 64px; display: block; text-align: center; }

    /* ── FLOATING TEXTS ─────────────────────────────────────────────────────── */
    .floating-container {
      position: absolute;
      top: 80px;
      right: 16px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      pointer-events: none;
    }
    .floating-text {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      animation: float-up 1.8s ease forwards;
      text-shadow: 0 0 10px currentColor;
    }

    /* ── WIN SCREEN ─────────────────────────────────────────────────────────── */
    .win-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 32px;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 1s ease;
      background: linear-gradient(180deg, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.62) 100%);
    }
    .win-screen--visible { opacity: 1; }
    .win-beach {
      flex-shrink: 0;
      text-align: center;
      padding: 24px 0 16px;
    }
    .win-sun { font-size: 52px; display: block; margin-bottom: 8px; animation: dawn-glow 3s ease-in-out infinite alternate; }
    .win-waves {
      font-family: var(--font-narrative);
      font-size: 20px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3em;
    }
    .win-text { text-align: center; margin: 20px 0; }
    .win-quote {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: clamp(17px, 4vw, 22px);
      color: rgba(255,255,255,0.58);
      margin-bottom: 8px;
      text-wrap: balance;
    }
    .win-answer {
      font-family: var(--font-narrative);
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 600;
      color: rgba(255,255,255,0.92);
    }
    .win-score-title {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.30);
      margin-bottom: 4px;
    }
    .win-score-overall {
      font-family: var(--font-ui);
      font-size: 52px;
      font-weight: 700;
      color: #4ade80;
      text-shadow: 0 0 28px rgba(74,222,128,0.45);
      line-height: 1;
      margin-bottom: 24px;
    }
    .win-dimensions {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 14px;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 16px 20px;
    }
    .win-dim { display: flex; align-items: center; gap: 10px; }
    .win-dim-name { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.05em; color: rgba(255,255,255,0.45); width: 44%; flex-shrink: 0; }
    .win-dim-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .win-dim-fill { height: 100%; background: linear-gradient(90deg, rgba(16,110,50,0.8), rgba(74,222,128,0.95)); border-radius: 2px; animation: meter-fill 1.2s ease forwards; }
    .win-dim-score { font-family: var(--font-ui); font-size: 9px; color: rgba(74,222,128,0.7); width: 24px; text-align: right; }
    .win-replay { max-width: 220px; }

    /* ── MUTE BUTTON ──────────────────────────────────────────────────────── */
    .hud-top-right { display: flex; align-items: center; gap: 8px; }
    .hud-mute {
      background: none; border: none; cursor: pointer;
      font-size: 13px; opacity: 0.55; padding: 2px 4px;
      transition: opacity 0.2s;
    }
    .hud-mute:hover { opacity: 1; }

    /* ── INVENTORY ────────────────────────────────────────────────────────── */
    .hud-inventory {
      display: flex; gap: 6px; margin-top: 6px;
      padding-top: 5px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .inv-item {
      font-size: 15px; cursor: default;
      transition: transform 0.2s;
      position: relative;
    }
    .inv-item:hover { transform: scale(1.3); }

    /* ── ITEM TOAST ───────────────────────────────────────────────────────── */
    .item-toast {
      position: absolute;
      bottom: 130px; left: 50%; transform: translateX(-50%);
      z-index: 30;
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 10px 18px 10px 14px;
      animation: item-toast-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards,
                 item-toast-out 0.3s ease 2.5s forwards;
      white-space: nowrap;
    }
    .item-toast-emoji { font-size: 22px; }
    .item-toast-text { display: flex; flex-direction: column; gap: 2px; }
    .item-toast-name {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.9); letter-spacing: 0.05em;
    }
    .item-toast-desc {
      font-family: var(--font-narrative); font-style: italic;
      font-size: 12px; color: rgba(255,255,255,0.45);
    }
    @keyframes item-toast-in  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes item-toast-out { from{opacity:1} to{opacity:0} }

    /* ── WIN INVENTORY ────────────────────────────────────────────────────── */
    .win-inventory {
      width:100%; max-width:400px; margin-bottom: 14px;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 16px 20px;
    }
    .win-inv-title {
      font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 10px;
      text-align: center;
    }
    .win-inv-items { display: flex; flex-direction: column; gap: 7px; }
    .win-inv-item { display: flex; align-items: center; gap: 10px; }
    .win-inv-emoji { font-size: 18px; width: 26px; text-align: center; }
    .win-inv-name {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.75); width: 110px;
    }
    .win-inv-desc {
      font-family: var(--font-narrative); font-style: italic;
      font-size: 13px; color: rgba(255,255,255,0.38);
    }
    .win-actions { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 260px; }

    /* ── WIN TIPS ───────────────────────────────────────────────────────────── */
    .win-section-title {
      font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.28);
      text-align: center; margin-bottom: 12px;
    }
    .win-tips {
      width: 100%; max-width: 400px; margin-bottom: 14px;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 16px 20px;
    }
    .win-tips-grid { display: flex; flex-direction: column; gap: 10px; }
    .win-tip {
      display: flex; gap: 12px; align-items: flex-start;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid rgba(74,222,128,0.45);
      border-radius: 3px; padding: 12px 14px;
    }
    .win-tip-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .win-tip-body { display: flex; flex-direction: column; gap: 3px; }
    .win-tip-title {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }
    .win-tip-text {
      font-family: var(--font-narrative); font-size: 13px;
      color: rgba(255,255,255,0.45); line-height: 1.55; text-wrap: pretty;
    }

    /* ── SOCIAL SHARE ───────────────────────────────────────────────────────── */
    .win-share {
      width: 100%; max-width: 400px; margin-bottom: 14px; text-align: center;
      background: rgba(0,0,0,0.52);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 16px 20px;
    }
    .win-share-text {
      font-family: var(--font-narrative); font-size: 14px;
      color: rgba(255,255,255,0.38); margin-bottom: 14px; font-style: italic;
    }
    .win-share-text strong { color: rgba(255,255,255,0.75); font-style: normal; }
    .win-share-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .share-btn {
      font-family: var(--font-ui); font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; padding: 9px 16px;
      border-radius: 3px; border: 1px solid; cursor: pointer;
      transition: all 0.18s ease; min-height: 36px;
    }
    .share-btn--twitter  { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.70); }
    .share-btn--whatsapp { background: rgba(37,211,102,0.08); border-color: rgba(37,211,102,0.28); color: #4ade80; }
    .share-btn--linkedin { background: rgba(0,160,220,0.08); border-color: rgba(0,160,220,0.28); color: rgba(100,200,255,0.85); }
    .share-btn--copy     { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.45); }
    .share-btn:hover { filter: brightness(1.22); transform: translateY(-1px); }

    /* ── LISTEN BUTTON ──────────────────────────────────────────────────────── */
    .listen-bar {
      display: flex; align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .listen-btn {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-ui); font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      background: none; border: none; cursor: pointer;
      padding: 2px 0; transition: color 0.2s ease;
    }
    .listen-btn:hover { color: rgba(255,255,255,0.75); }
    .listen-btn--active { color: var(--c-tranquility); }
    .listen-icon { font-size: 12px; }
    .listen-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--c-tranquility);
      animation: listen-pulse 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes listen-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }

    /* ── NAV BAR ────────────────────────────────────────────────────────────── */
    .nav-bar {
      position: relative;
      z-index: 20;
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .nav-btn {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      padding: 6px 11px;
      cursor: pointer;
      transition: all 0.18s ease;
      min-height: 32px;
      white-space: nowrap;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.22);
    }
    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .nav-btn--danger {
      color: rgba(239,68,68,0.6);
      border-color: rgba(239,68,68,0.2);
    }
    .nav-btn--danger:hover:not(:disabled) {
      background: rgba(239,68,68,0.1);
      color: rgba(239,68,68,0.9);
      border-color: rgba(239,68,68,0.4);
    }
    .nav-btn--accent {
      color: rgba(74,222,128,0.6);
      border-color: rgba(74,222,128,0.2);
    }
    .nav-btn--accent:hover:not(:disabled) {
      background: rgba(74,222,128,0.08);
      color: rgba(74,222,128,0.95);
      border-color: rgba(74,222,128,0.4);
    }
    .nav-btn--world {
      color: rgba(167,139,250,0.65);
      border-color: rgba(167,139,250,0.2);
    }
    .nav-btn--world:hover:not(:disabled) {
      background: rgba(167,139,250,0.08);
      color: rgba(167,139,250,0.95);
      border-color: rgba(167,139,250,0.4);
    }
    .nav-bar { flex-wrap: wrap; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
    @media (min-width: 600px) {
      .main-content { padding: 20px 10%; }
      .hud { padding: 12px 10% 10px; }
      .narrative-box { max-height: 32vh; }
    }
    @media (min-width: 900px) {
      .main-content { padding: 24px 20%; }
      .hud { padding: 12px 20% 10px; }
    }

    /* ── KEYBOARD SHORTCUT BADGE ────────────────────────────────────────────── */
    .choice-kbd {
      font-family: var(--font-ui);
      font-size: 8px;
      opacity: 0.32;
      margin-right: 6px;
      letter-spacing: 0;
    }

    /* ── WORLD PROGRESS BAR ─────────────────────────────────────────────────── */
    .hud-progress-wrap {
      height: 2px;
      background: rgba(255,255,255,0.06);
      margin-top: 6px;
      border-radius: 1px;
      overflow: hidden;
    }
    .hud-progress-fill {
      height: 100%;
      background: #f59e0b;
      border-radius: 1px;
      transition: width 0.7s ease;
    }

    /* ── CURIOSITY XP ───────────────────────────────────────────────────────── */
    .hud-xp {
      font-family: var(--font-ui);
      font-size: 9px;
      color: #fb923c;
      letter-spacing: 0.08em;
    }

    /* ── API KEY MODAL ──────────────────────────────────────────────────────── */
    .api-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .api-modal {
      background: #0a0f1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 24px 20px;
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .api-modal-title {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .api-modal-label {
      font-family: var(--font-ui);
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }
    .api-modal-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      color: rgba(255,255,255,0.85);
      font-family: var(--font-ui);
      font-size: 11px;
      outline: none;
    }
    .api-modal-input:focus { border-color: rgba(34,211,238,0.4); }
    .api-modal-banner {
      font-family: var(--font-narrative);
      font-size: 13px;
      color: #fb923c;
      font-style: italic;
    }

    /* ── CONFIRM RESET ──────────────────────────────────────────────────────── */
    .nav-btn--confirm {
      color: #fb923c !important;
      border-color: rgba(251,146,60,0.5) !important;
      animation: boss-pulse 1s ease-in-out infinite;
    }

    /* ── HOME SCREEN ────────────────────────────────────────────────────────── */
    .home-screen {
      position: relative;
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      background: radial-gradient(ellipse at 50% 60%, #1a0f2e 0%, #06030f 70%);
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .home-screen--vis { opacity: 1; }
    .home-glow {
      position: absolute;
      top: 38%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 420px;
      background: radial-gradient(ellipse, rgba(100,60,200,0.22) 0%, transparent 68%);
      pointer-events: none;
      animation: phone-glow 3.5s ease-in-out infinite alternate;
      border-radius: 20px;
    }
    .home-inner {
      position: relative;
      z-index: 2;
      width: 100%; max-width: 680px;
      padding: 52px 24px 44px;
      display: flex; flex-direction: column;
      gap: 32px;
    }
    .home-header { text-align: center; }
    .home-eyebrow {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-bottom: 18px;
    }
    .home-title {
      font-family: var(--font-narrative);
      font-size: clamp(36px, 9vw, 60px);
      font-weight: 300;
      color: rgba(255,255,255,0.95);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    .home-tagline {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: clamp(15px, 3.5vw, 19px);
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
    }
    .home-about { text-align: center; padding: 0 4px; }
    .home-about-text {
      font-family: var(--font-narrative);
      font-size: clamp(14px, 3.2vw, 17px);
      color: rgba(255,255,255,0.50);
      line-height: 1.78;
    }
    .home-columns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 28px;
    }
    @media (min-width: 580px) { .home-columns { grid-template-columns: 1fr 1fr; } }
    .home-section-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      margin-bottom: 14px;
    }
    .home-meter-list { display: flex; flex-direction: column; gap: 13px; }
    .home-meter-row { display: flex; align-items: flex-start; gap: 11px; }
    .home-meter-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .home-meter-name {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.3;
    }
    .home-meter-hint {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      margin-top: 2px;
      line-height: 1.4;
    }
    .home-world-list { display: flex; flex-direction: column; gap: 11px; }
    .home-world-row { display: flex; align-items: flex-start; gap: 12px; }
    .home-world-num {
      font-family: var(--font-ui);
      font-size: 9px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.1em;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .home-world-info { display: flex; flex-direction: column; gap: 2px; }
    .home-world-name {
      font-family: var(--font-ui);
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.04em;
    }
    .home-world-desc {
      font-family: var(--font-narrative);
      font-style: italic;
      font-size: 12px;
      color: rgba(255,255,255,0.26);
      line-height: 1.4;
    }
    .home-ctas {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 28px;
    }
    .home-btn-primary {
      font-family: var(--font-ui);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c-focus);
      background: rgba(34,211,238,0.07);
      border: 1px solid rgba(34,211,238,0.28);
      border-radius: 3px;
      padding: 16px 44px;
      cursor: pointer;
      transition: all 0.22s ease;
      width: 100%; max-width: 320px;
    }
    .home-btn-primary:hover {
      background: rgba(34,211,238,0.15);
      border-color: rgba(34,211,238,0.55);
      box-shadow: 0 0 22px rgba(34,211,238,0.14);
    }
    .home-btn-secondary {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 3px;
      padding: 12px 32px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%; max-width: 320px;
    }
    .home-btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.68);
      border-color: rgba(255,255,255,0.18);
    }
    .home-hints {
      text-align: center;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.16);
      padding-bottom: 8px;
    }
    .home-kbd {
      display: inline-block;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--font-ui);
      font-size: 9px;
      color: rgba(255,255,255,0.38);
      margin: 0 1px;
    }

    /* ── CREATOR SECTION ────────────────────────────────────────────────────── */
    .home-creator {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .home-creator-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
      margin-bottom: 8px;
    }
    .home-creator-card {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .home-creator-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(167,139,250,0.25));
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .home-creator-meta { display: flex; flex-direction: column; gap: 4px; }
    .home-creator-name {
      font-family: var(--font-narrative);
      font-size: 20px;
      font-weight: 600;
      color: rgba(255,255,255,0.90);
      line-height: 1.2;
    }
    .home-creator-role {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .home-creator-bio {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
    }
    .home-creator-bio p {
      font-family: var(--font-narrative);
      font-size: clamp(14px, 3.2vw, 16px);
      color: rgba(255,255,255,0.48);
      line-height: 1.80;
    }
    .home-creator-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .home-creator-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 9px 16px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      transition: all 0.2s ease;
    }
    .home-creator-link:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.88);
    }
    .home-creator-link-icon {
      font-size: 12px;
      font-style: normal;
      line-height: 1;
    }
    .home-creator-cta {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-focus);
      text-decoration: none;
      border-bottom: 1px solid rgba(34,211,238,0.30);
      padding-bottom: 2px;
      transition: all 0.2s ease;
      margin-left: 4px;
    }
    .home-creator-cta:hover {
      color: rgba(34,211,238,0.90);
      border-bottom-color: rgba(34,211,238,0.70);
    }
    .home-footer-bar {
      text-align: center;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.12);
      padding: 16px 0 4px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* ── THEME TOGGLE BUTTON (homepage) ─────────────────────────────────────── */
    .home-theme-btn {
      position: absolute;
      top: 18px; right: 18px;
      z-index: 10;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .home-theme-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
    }

    /* ── LIGHT MODE ─────────────────────────────────────────────────────────── */

    /* App shell */
    [data-theme="light"] html,
    [data-theme="light"] body { background: #f4f0ff; }

    /* HUD */
    [data-theme="light"] .hud {
      background: rgba(255,255,255,0.90);
      border-bottom-color: rgba(0,0,0,0.07);
      backdrop-filter: blur(14px);
    }
    [data-theme="light"] .hud-world-label { color: rgba(30,20,50,0.42); }
    [data-theme="light"] .meter-label     { color: rgba(30,20,50,0.40); }
    [data-theme="light"] .meter-track     { background: rgba(0,0,0,0.08); }
    [data-theme="light"] .ghost-warning   { color: var(--c-oneness); }
    [data-theme="light"] .hud-xp          { color: #c2730a; }
    [data-theme="light"] .hud-progress-wrap { background: rgba(0,0,0,0.07); }
    [data-theme="light"] .hud-inventory { border-top-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .hud-mute { color: rgba(30,20,50,0.55); }

    /* Narrative */
    [data-theme="light"] .narrative-box {
      background: rgba(255,255,255,0.88);
      border-color: rgba(0,0,0,0.07);
      backdrop-filter: blur(14px);
    }
    [data-theme="light"] .narrative-para { color: rgba(20,10,40,0.82); }
    [data-theme="light"] .listen-bar     { border-bottom-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .listen-btn     { color: rgba(20,10,40,0.32); }
    [data-theme="light"] .listen-btn:hover { color: rgba(20,10,40,0.65); }
    [data-theme="light"] .listen-btn--active { color: var(--c-tranquility); }
    [data-theme="light"] .dunbar-quote   { color: var(--c-oneness); }

    /* Choices */
    [data-theme="light"] .choice-btn {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.10);
      color: rgba(20,10,40,0.78);
    }
    [data-theme="light"] .choice-btn:hover,
    [data-theme="light"] .choice-btn:focus-visible {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.20);
      color: rgba(20,10,40,0.95);
    }
    [data-theme="light"] .choice-btn--primary {
      background: rgba(34,211,238,0.10);
      border-color: rgba(34,211,238,0.40);
      color: #0891b2;
    }
    [data-theme="light"] .choice-btn--primary:hover { background: rgba(34,211,238,0.18); }
    [data-theme="light"] .choice-kbd { color: rgba(20,10,40,0.28); }

    /* Nav bar */
    [data-theme="light"] .nav-bar {
      background: rgba(255,255,255,0.90);
      border-top-color: rgba(0,0,0,0.06);
      backdrop-filter: blur(10px);
    }
    [data-theme="light"] .nav-btn {
      color: rgba(20,10,40,0.48);
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.09);
    }
    [data-theme="light"] .nav-btn:hover:not(:disabled) {
      background: rgba(0,0,0,0.08);
      color: rgba(20,10,40,0.85);
      border-color: rgba(0,0,0,0.18);
    }
    [data-theme="light"] .nav-btn--world { color: rgba(120,80,200,0.65); border-color: rgba(120,80,200,0.18); }
    [data-theme="light"] .nav-btn--world:hover:not(:disabled) { color: rgba(120,80,200,0.92); background: rgba(120,80,200,0.07); }
    [data-theme="light"] .nav-btn--accent { color: rgba(22,163,74,0.70); border-color: rgba(22,163,74,0.20); }
    [data-theme="light"] .nav-btn--accent:hover:not(:disabled) { color: rgba(22,163,74,0.95); background: rgba(22,163,74,0.08); }

    /* World intro */
    [data-theme="light"] .world-intro-number { color: rgba(20,10,40,0.38); }
    [data-theme="light"] .world-intro-title  { color: rgba(20,10,40,0.90); }
    [data-theme="light"] .world-intro-desc   { color: rgba(20,10,40,0.52); }
    [data-theme="light"] .world-intro-btn {
      color: rgba(20,10,40,0.65);
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.15);
    }

    /* Special panels (timer, frog, delete) */
    [data-theme="light"] .special-panel {
      background: rgba(255,255,255,0.90);
      border-color: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .timer-instruction  { color: rgba(20,10,40,0.45); }
    [data-theme="light"] .timer-complete-sub { color: rgba(20,10,40,0.45); }
    [data-theme="light"] .frog-caption       { color: rgba(20,10,40,0.42); }
    [data-theme="light"] .frog-well .frog-circle {
      background: radial-gradient(ellipse at 50% 20%, rgba(135,206,235,0.4) 0%, rgba(200,240,200,0.8) 70%);
    }

    /* Data reveal */
    [data-theme="light"] .data-reveal {
      background: rgba(255,255,255,0.85);
      border-color: rgba(34,211,238,0.25);
    }
    [data-theme="light"] .data-stat-label { color: rgba(20,10,40,0.50); }
    [data-theme="light"] .data-reveal-question { color: rgba(20,10,40,0.45); }

    /* Item toast */
    [data-theme="light"] .item-toast {
      background: rgba(255,255,255,0.94);
      border-color: rgba(0,0,0,0.09);
    }
    [data-theme="light"] .item-toast-name { color: rgba(20,10,40,0.88); }
    [data-theme="light"] .item-toast-desc { color: rgba(20,10,40,0.45); }

    /* Scene background particle/overlay adjustments */
    [data-theme="light"] .scene-bg--city::before { opacity: 0.15; }
    [data-theme="light"] .scene-bg--city::after  { opacity: 0.25; }
    [data-theme="light"] .scene-bg--arcade::after { opacity: 0.35; }
    [data-theme="light"] .app.ghost-active .main-content { filter: none; opacity: 0.90; }

    /* API modal */
    [data-theme="light"] .api-modal-overlay { background: rgba(0,0,0,0.40); }
    [data-theme="light"] .api-modal {
      background: #ffffff;
      border-color: rgba(0,0,0,0.10);
    }
    [data-theme="light"] .api-modal-title { color: rgba(20,10,40,0.50); }
    [data-theme="light"] .api-modal-label { color: rgba(20,10,40,0.42); }
    [data-theme="light"] .api-modal-input {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.12);
      color: rgba(20,10,40,0.85);
    }
    [data-theme="light"] .api-modal-input:focus { border-color: rgba(34,211,238,0.5); }

    /* Homepage */
    [data-theme="light"] .home-screen {
      background: radial-gradient(ellipse at 50% 60%, #dcd4f0 0%, #f4f0ff 70%);
    }
    [data-theme="light"] .home-eyebrow      { color: rgba(20,10,50,0.32); }
    [data-theme="light"] .home-title        { color: rgba(20,10,50,0.92); }
    [data-theme="light"] .home-tagline      { color: rgba(20,10,50,0.40); }
    [data-theme="light"] .home-about-text   { color: rgba(20,10,50,0.52); }
    [data-theme="light"] .home-section-label { color: rgba(20,10,50,0.28); }
    [data-theme="light"] .home-meter-hint   { color: rgba(20,10,50,0.36); }
    [data-theme="light"] .home-world-num    { color: rgba(20,10,50,0.20); }
    [data-theme="light"] .home-world-name   { color: rgba(20,10,50,0.75); }
    [data-theme="light"] .home-world-desc   { color: rgba(20,10,50,0.30); }
    [data-theme="light"] .home-columns      { border-top-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .home-ctas         { border-top-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .home-btn-primary  {
      background: rgba(34,211,238,0.10);
      border-color: rgba(34,211,238,0.38);
      color: #0891b2;
    }
    [data-theme="light"] .home-btn-primary:hover { background: rgba(34,211,238,0.18); box-shadow: 0 0 18px rgba(34,211,238,0.16); }
    [data-theme="light"] .home-btn-secondary {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.10);
      color: rgba(20,10,50,0.48);
    }
    [data-theme="light"] .home-btn-secondary:hover { color: rgba(20,10,50,0.78); background: rgba(0,0,0,0.07); }
    [data-theme="light"] .home-hints        { color: rgba(20,10,50,0.20); }
    [data-theme="light"] .home-kbd {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.12);
      color: rgba(20,10,50,0.40);
    }
    [data-theme="light"] .home-creator-divider { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.10), transparent); }
    [data-theme="light"] .home-creator-avatar {
      background: linear-gradient(135deg, rgba(34,211,238,0.18), rgba(167,139,250,0.18));
      border-color: rgba(0,0,0,0.10);
      color: rgba(20,10,50,0.70);
    }
    [data-theme="light"] .home-creator-name { color: rgba(20,10,50,0.90); }
    [data-theme="light"] .home-creator-role { color: rgba(20,10,50,0.30); }
    [data-theme="light"] .home-creator-bio {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.06);
    }
    [data-theme="light"] .home-creator-bio p { color: rgba(20,10,50,0.52); }
    [data-theme="light"] .home-creator-link {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.09);
      color: rgba(20,10,50,0.58);
    }
    [data-theme="light"] .home-creator-link:hover { background: rgba(0,0,0,0.08); color: rgba(20,10,50,0.88); border-color: rgba(0,0,0,0.18); }
    [data-theme="light"] .home-footer-bar { color: rgba(20,10,50,0.16); border-top-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .home-theme-btn {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.11);
    }
    [data-theme="light"] .home-theme-btn:hover { background: rgba(0,0,0,0.10); }

    /* ── HOME INFO BUTTON ───────────────────────────────────────────────────── */
    .home-btn-info {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%; max-width: 320px;
      text-decoration: none;
    }
    .home-btn-info:hover {
      color: rgba(255,255,255,0.60);
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }
    [data-theme="light"] .home-btn-info { color: rgba(20,10,50,0.32); }
    [data-theme="light"] .home-btn-info:hover { color: rgba(20,10,50,0.70); border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.04); }

    /* ── INFO PAGE ──────────────────────────────────────────────────────────── */
    .info-page {
      height: 100%;
      overflow-y: auto;
      background: var(--bg-intro, #0a0a12);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .info-page--vis {
      opacity: 1;
      transform: translateY(0);
    }
    .info-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 28px 64px;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }
    .info-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .info-header-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-back-btn {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.40);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 3px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .info-back-btn:hover {
      color: rgba(255,255,255,0.80);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
    }
    .info-title {
      font-family: var(--font-narrative);
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .info-subtitle {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.30);
      margin: 0;
      text-transform: uppercase;
    }
    .info-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-left: 16px;
      border-left: 2px solid rgba(255,255,255,0.08);
    }
    .info-section-title {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin: 0;
    }
    .info-body {
      font-family: var(--font-narrative);
      font-size: 16px;
      line-height: 1.75;
      color: rgba(255,255,255,0.62);
      margin: 0;
    }
    .info-body strong { color: rgba(255,255,255,0.78); font-weight: 600; }
    .info-body em { color: rgba(255,255,255,0.75); font-style: italic; }
    .info-body--small { font-size: 13px; color: rgba(255,255,255,0.40); }
    .info-feature-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .info-feature-chip {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.48);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 3px;
      padding: 5px 12px;
    }
    /* meters */
    .info-meter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .info-meter-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-left-width: 3px;
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-meter-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-meter-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .info-meter-label {
      font-family: var(--font-ui);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .info-meter-start {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.25);
      margin-left: auto;
    }
    .info-meter-desc {
      font-family: var(--font-narrative);
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255,255,255,0.50);
      margin: 0;
    }
    /* scoring formula */
    .info-formula-block {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-formula-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .info-formula {
      font-family: var(--font-ui);
      font-size: clamp(12px, 2.5vw, 15px);
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.78);
      line-height: 1.5;
    }
    /* dimensions */
    .info-dimensions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .info-dimension-chip {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.40);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 5px 10px;
    }
    /* worlds */
    .info-world-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .info-world-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-world-card--swamp  { border-top-color: #4ade80; }
    .info-world-card--arcade { border-top-color: #fb923c; }
    .info-world-card--city   { border-top-color: #a78bfa; }
    .info-world-card--trail  { border-top-color: #22d3ee; }
    .info-world-num {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.22);
    }
    .info-world-name {
      font-family: var(--font-narrative);
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.78);
    }
    .info-world-desc {
      font-family: var(--font-narrative);
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255,255,255,0.46);
      margin: 0;
    }
    /* items */
    .info-items-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .info-item-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 8px 14px;
      cursor: default;
      transition: background 0.15s ease;
    }
    .info-item-chip:hover { background: rgba(255,255,255,0.08); }
    .info-item-emoji { font-size: 16px; }
    .info-item-name {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.50);
    }
    /* source */
    .info-source-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-source-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .info-source-link {
      font-family: var(--font-narrative);
      font-size: 18px;
      font-weight: 600;
      color: #22d3ee;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .info-source-link:hover { color: #67e8f9; text-decoration: underline; }
    .info-source-desc {
      font-family: var(--font-narrative);
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255,255,255,0.38);
      margin: 0;
    }
    /* footer */
    .info-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .info-footer-note {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.16);
    }
    /* info page theme toggle inline override */
    .info-theme-btn {
      position: static;
      margin-left: auto;
      flex-shrink: 0;
    }
    /* simulated scenario cards */
    .info-scenario-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .info-scenario-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-width: 2px;
      border-radius: 6px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .info-scenario-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .info-scenario-name {
      font-family: var(--font-narrative);
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.78);
    }
    .info-scenario-score {
      font-family: var(--font-ui);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .info-scenario-score-denom {
      font-size: 11px;
      opacity: 0.45;
      letter-spacing: 0;
    }
    .info-scenario-desc {
      font-family: var(--font-narrative);
      font-size: 14px;
      line-height: 1.60;
      color: rgba(255,255,255,0.44);
      margin: 0;
    }
    .info-scenario-meter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .info-scenario-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 4px 10px;
    }
    .info-scenario-pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .info-scenario-pill-label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.30);
    }
    .info-scenario-pill-val {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
    }
    .info-scenario-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .info-scenario-bar {
      height: 100%;
      border-radius: 2px;
    }
    .info-scenario-dim-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .info-scenario-dim-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .info-scenario-dim-name {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      width: 44%;
      flex-shrink: 0;
    }
    .info-scenario-dim-track {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .info-scenario-dim-fill {
      height: 100%;
      border-radius: 2px;
      opacity: 0.65;
    }
    .info-scenario-dim-val {
      font-family: var(--font-ui);
      font-size: 10px;
      color: rgba(255,255,255,0.30);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    /* light mode overrides */
    [data-theme="light"] .info-page          { background: #f5f3ef; }
    [data-theme="light"] .info-title         { color: rgba(20,10,50,0.88); }
    [data-theme="light"] .info-subtitle      { color: rgba(20,10,50,0.32); }
    [data-theme="light"] .info-back-btn      { color: rgba(20,10,50,0.50); background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.10); }
    [data-theme="light"] .info-back-btn:hover{ color: rgba(20,10,50,0.88); background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.20); }
    [data-theme="light"] .info-section       { border-left-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-section-title { color: rgba(20,10,50,0.35); }
    [data-theme="light"] .info-body          { color: rgba(20,10,50,0.65); }
    [data-theme="light"] .info-body strong   { color: rgba(20,10,50,0.80); }
    [data-theme="light"] .info-body em       { color: rgba(20,10,50,0.75); }
    [data-theme="light"] .info-body--small   { color: rgba(20,10,50,0.40); }
    [data-theme="light"] .info-feature-chip  { color: rgba(20,10,50,0.50); background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-meter-card    { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.09); }
    [data-theme="light"] .info-meter-start   { color: rgba(20,10,50,0.30); }
    [data-theme="light"] .info-meter-desc    { color: rgba(20,10,50,0.55); }
    [data-theme="light"] .info-formula-block { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-formula-label { color: rgba(20,10,50,0.30); }
    [data-theme="light"] .info-formula       { color: rgba(20,10,50,0.80); }
    [data-theme="light"] .info-dimension-chip{ color: rgba(20,10,50,0.45); background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-world-card    { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-world-num     { color: rgba(20,10,50,0.25); }
    [data-theme="light"] .info-world-name    { color: rgba(20,10,50,0.80); }
    [data-theme="light"] .info-world-desc    { color: rgba(20,10,50,0.50); }
    [data-theme="light"] .info-item-chip     { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-item-chip:hover { background: rgba(0,0,0,0.07); }
    [data-theme="light"] .info-item-name     { color: rgba(20,10,50,0.55); }
    [data-theme="light"] .info-source-box    { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.09); }
    [data-theme="light"] .info-source-label  { color: rgba(20,10,50,0.28); }
    [data-theme="light"] .info-source-desc   { color: rgba(20,10,50,0.45); }
    [data-theme="light"] .info-footer        { border-top-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .info-footer-note   { color: rgba(20,10,50,0.18); }
    [data-theme="light"] .info-scenario-card      { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-scenario-name      { color: rgba(20,10,50,0.80); }
    [data-theme="light"] .info-scenario-desc      { color: rgba(20,10,50,0.48); }
    [data-theme="light"] .info-scenario-pill      { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
    [data-theme="light"] .info-scenario-pill-label { color: rgba(20,10,50,0.32); }
    [data-theme="light"] .info-scenario-bar-wrap  { background: rgba(0,0,0,0.07); }
    [data-theme="light"] .info-scenario-dim-grid  { border-top-color: rgba(0,0,0,0.06); }
    [data-theme="light"] .info-scenario-dim-name  { color: rgba(20,10,50,0.30); }
    [data-theme="light"] .info-scenario-dim-track { background: rgba(0,0,0,0.07); }
    [data-theme="light"] .info-scenario-dim-val   { color: rgba(20,10,50,0.32); }
  </style>
</head>

  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="AudioEngine.js"></script>
  <script src="game-scenes.js"></script>
  <script type="text/babel" src="Illustrations.jsx"></script>
  <script type="text/babel" src="Game.jsx"></script>
